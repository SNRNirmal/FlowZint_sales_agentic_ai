version: "3.9"
 
services:
  backend:
    build: ./backend
    container_name: threshold-backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./backend:/app

    restart: unless-stopped

    # Uncomment after moving to PostgreSQL
    # depends_on:
    #   - db

  frontend:
    build: ./frontend
    container_name: threshold-frontend

    ports:
      - "3000:3000"

    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000

    volumes:
      - ./frontend:/app
      - /app/node_modules

    depends_on:
      - backend

    restart: unless-stopped

  # Uncomment after PostgreSQL migration
